name: Build meetings index

on:
  push:
    branches: [main]
    paths:
      - "meetings/**"
      - "_template/**"
      - "scripts/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rebuild meetings.json
        run: python3 scripts/build_index.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "chore: rebuild meetings index [skip ci]"
            git push
          else
            echo "Index already up to date."
          fi
